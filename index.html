<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisah Perjalanan Romantis - Sakura Malam</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow: hidden; scroll-behavior: smooth; }
        html.unlocked { overflow-y: scroll; }

        body {
            color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            
            /* --- KODE BACKGROUND ANDA --- */
            background-image: url('background.jpg'); /* GANTI DENGAN NAMA FILE FOTO ANDA */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(5, 4, 10, 0.7);
            background-blend-mode: multiply;
        }

        /* --- KODE ASLI ANDA TETAP ADA DI SINI --- */
        .starry-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .hero-section { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; padding: 30px; z-index: 100; position: relative; }
        .hero-box { max-width: 650px; background: rgba(14, 10, 22, 0.7); padding: 55px 40px; border-radius: 6px; backdrop-filter: blur(15px); text-align: center; }
        .hero-box h1 { font-family: 'Playfair Display', serif; font-size: 2.6rem; font-style: italic; margin-bottom: 20px; }
        .explore-btn { background: #fff9f2; color: #110d22; border: none; padding: 15px 40px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-weight: 500; }
        .album-container { display: none; }
        .album-container.active { display: block; }
        .album-page { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .photo-card { background: rgba(255, 255, 255, 0.94); color: #2a221b; width: 100%; max-width: 560px; padding: 24px; text-align: center; }
        .photo-card img { width: 100%; height: 380px; object-fit: cover; }
        .story-text { margin-top: 30px; font-size: 1.3rem; font-style: italic; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="musik-romantis.mp3" loop></audio>

    <section class="hero-section" id="hero">
        <div class="hero-box">
            <h1>Kisah Perjalanan Romantis</h1>
            <p>Setiap lembar foto menyimpan detak waktu saat dunia kita mulai menyatu.</p>
            <button class="explore-btn" onclick="startJourney()">Jelajahi Cerita</button>
        </div>
    </section>

    <div class="album-container" id="albumView">
        <section class="album-page">
            <div class="photo-card">
                <img src="foto2.jpg" alt="Foto">
                <div class="story-text">"Semuanya dimulai dari pertemuan yang tak pernah diduga."</div>
            </div>
        </section>
        </div>

    <script>
        function startJourney() {
            document.getElementById("hero").style.display = "none";
            document.getElementById("albumView").classList.add('active');
            document.documentElement.classList.add('unlocked');
            document.getElementById("bgMusic").play().catch(e => console.log("Audio siap"));
        }
    </script>
</body>
</html>
