<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisah Perjalanan Romantis - Sakura Malam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --text-main: #ffffff; --text-muted: #dcd1c4; --bg-card: rgba(255, 255, 255, 0.94); --text-card: #2a221b; }
        html { overflow: hidden; scroll-behavior: smooth; }
        html.unlocked { overflow-y: scroll; }

        body {
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            /* BACKGROUND FOTO ANDA */
            background: linear-gradient(rgba(5, 4, 10, 0.7), rgba(5, 4, 10, 0.7)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .starry-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 20px 30px, #eee, transparent), radial-gradient(1.5px 1.5px at 40px 70px, #fff, transparent); background-size: 300px 300px; animation: stars-twinkle 4s ease-in-out infinite alternate; opacity: 0.6; z-index: 0; pointer-events: none; }
        @keyframes stars-twinkle { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }
        
        .tree-container { position: fixed; bottom: -2vh; left: -2vw; width: 45vw; height: 100vh; z-index: 2; pointer-events: none; }
        .trunk { position: absolute; bottom: 0; left: 20%; width: 70px; height: 70%; background: #05030a; clip-path: polygon(30% 0%, 65% 0%, 75% 25%, 60% 45%, 85% 70%, 100% 100%, 0% 100%, 15% 75%, 35% 50%, 20% 25%); }
        .foliage-group { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .leaves { position: absolute; background: #05030a; border-radius: 50% 60% 40% 50% / 40% 50% 60% 50%; filter: blur(1px); }
        .leaves-1 { width: 180px; height: 130px; top: 10%; left: 5%; box-shadow: 80px -30px 0 10px #05030a; }

        .hero-section { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; padding: 30px; z-index: 100; position: relative; }
        .hero-box { max-width: 650px; background: rgba(14, 10, 22, 0.7); padding: 55px 40px; border-radius: 6px; backdrop-filter: blur(15px); text-align: center; }
        .explore-btn { background: #fff9f2; color: #110d22; border: none; padding: 15px 40px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; }
        .album-container { display: none; z-index: 80; position: relative; }
        .album-container.active { display: block; }
        .album-page { height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; }
        .photo-card { background: var(--bg-card); color: var(--text-card); width: 100%; max-width: 560px; padding: 24px; text-align: center; }
        .photo-card img { width: 100%; height: 380px; object-fit: cover; }
        #sakura-particles { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
        .sakura { position: absolute; color: rgba(255, 182, 193, 0.75); }
    </style>
</head>
<body>

    <div class="starry-sky"></div>
    <div class="tree-container">
        <div class="trunk"></div>
        <div class="foliage-group"><div class="leaves leaves-1"></div></div>
    </div>
    <div id="sakura-particles"></div>

    <audio id="bgMusic" src="musik-romantis.mp3" loop></audio>

    <section class="hero-section" id="hero">
        <div class="hero-box">
            <h1>Kisah Perjalanan Romantis</h1>
            <button class="explore-btn" onclick="startJourney()">Jelajahi Cerita</button>
        </div>
    </section>

    <div class="album-container" id="albumView">
        <section class="album-page">
            <div class="photo-card">
                <img src="foto2.jpg" alt="Foto">
                <div class="story-text">"Semuanya dimulai dari pertemuan yang tak pernah diduga."</div>
            </div>
        </section>
    </div>

    <script>
        function startJourney() {
            document.getElementById("hero").style.display = "none";
            document.getElementById("albumView").classList.add('active');
            document.documentElement.classList.add('unlocked');
            document.getElementById("bgMusic").play().catch(e => console.log("Audio ready"));
        }
    </script>
</body>
</html>
