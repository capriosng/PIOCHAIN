<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisah Perjalanan Kita</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at 50% 50%, #3a3250 0%, #1e1a33 60%, #0d0b1a 100%); 
            color: #f4e8d3; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; min-height: 100vh; 
        }

        /* Elemen Langit */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.7; }
        .shooting-star { position: absolute; width: 2px; height: 2px; background: white; box-shadow: 0 0 10px white; z-index: 1; animation: shoot linear infinite; }
        @keyframes shoot { 0% { transform: translate(0, 0); opacity: 1; } 100% { transform: translate(500px, 500px); opacity: 0; } }
        .moon { position: fixed; top: 10%; right: 15%; width: 140px; height: 140px; background: #fffdf5; border-radius: 50%; box-shadow: 0 0 60px #fff9e0; z-index: 1; }
        
        /* Pohon & Ayunan */
        .tree-container { position: fixed; bottom: 0; left: 0; width: 40vw; height: 80vh; z-index: 2; pointer-events: none; }
        .trunk { position: absolute; bottom: 0; left: 10%; width: 80px; height: 60%; background: #2a2538; border-right: 5px solid #3d3655; clip-path: polygon(30% 0%, 65% 0%, 100% 100%, 0% 100%); }
        .tree-swing { position: absolute; top: 10px; left: 220px; width: 40px; height: 250px; border-left: 3px solid #e0dcd5; border-right: 3px solid #e0dcd5; transform-origin: top center; animation: gentle-swing 6s ease-in-out infinite alternate; }
        @keyframes gentle-swing { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }

        /* Sakura */
        #sakura-particles { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; }
        .sakura { position: absolute; color: rgba(255, 200, 210, 0.9); animation: fall linear infinite; }
        @keyframes fall { 0% { top: -20px; opacity: 0; } 100% { top: 105vh; opacity: 1; } }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 100; position: relative; }
        .explore-btn { padding: 18px 40px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #f4e8d3; border-radius: 50px; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(5px); }
        .explore-btn:hover { background: #f4e8d3; color: #1e1a33; }

        /* Album */
        .album-container { display: none; padding: 100px 0; z-index: 60; position: relative; }
        .album-container.active { display: block; }
        .photo-card { width: 80%; max-width: 400px; margin: 100px auto; border-radius: 150px 30px 150px 30px; overflow: hidden; background: rgba(255, 255, 255, 0.95); color: #1e1a33; padding: 30px; opacity: 0; transform: scale(0.9); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .photo-card.visible { opacity: 1; transform: scale(1); }
        .photo-card img { width: 100%; height: 350px; object-fit: cover; border-radius: 120px 20px 120px 20px; }
        .story-text { margin-top: 25px; font-size: 1.3rem; font-style: italic; text-align: center; color: #333; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <div class="moon"></div>
    <div class="tree-container"><div class="trunk"><div class="tree-swing"></div></div></div>
    <div id="sakura-particles"></div>

    <audio id="bgMusic" src="musik-romantis.mp3" loop></audio>

    <section class="hero" id="hero">
        <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem; margin-bottom: 25px;">Kisah Perjalanan Kita</h1>
        <button class="explore-btn" onclick="startJourney()">Mulai Membuka Kenangan</button>
    </section>

    <div class="album-container" id="albumView">
        <script>
            // Setup Bintang
            for(let i=0; i<150; i++) {
                let s = document.createElement('div');
                s.className = 'star';
                s.style.width = s.style.height = Math.random()*3 + 'px';
                s.style.left = Math.random()*100 + '%';
                s.style.top = Math.random()*100 + '%';
                document.getElementById('stars').appendChild(s);
            }
            setInterval(() => {
                let ss = document.createElement('div');
                ss.className = 'shooting-star';
                ss.style.left = Math.random()*100 + '%';
                ss.style.top = Math.random()*50 + '%';
                ss.style.animationDuration = Math.random()*2 + 1 + 's';
                document.body.appendChild(ss);
                setTimeout(() => ss.remove(), 2000);
            }, 3000);

            const captions = [
                "Pertemuan pertama yang tak pernah kusangka, di mana semesta seolah berhenti sejenak hanya untuk memperkenalkan kita dalam sebuah takdir yang begitu sederhana namun luar biasa.",
                "Senyuman canggungmu saat itu adalah hal paling jujur yang pernah kulihat, mampu meruntuhkan segala benteng pertahanan diriku dan membuat hatiku berdebar tanpa alasan pasti.",
                "Mulai dari pesan-pesan singkat di layar ponsel yang tak pernah ada habisnya, kita perlahan merajut cerita, membangun jembatan emosional di antara dua dunia yang berbeda.",
                "Keberanian kita untuk melangkah keluar dari zona nyaman, memberanikan diri untuk bertemu nyata, menjadi awal dari sebuah petualangan yang tak akan pernah aku sesali sedikit pun.",
                "Kencan pertama yang dipenuhi tawa renyah, canggung yang manis, dan tatapan yang saling mencari kenyamanan—sebuah memori yang abadi tersimpan di sudut hatiku.",
                "Kita adalah dua jiwa yang menemukan satu frekuensi yang sama di tengah riuhnya dunia, di mana setiap diskusi menjadi berarti dan setiap diam pun terasa begitu menenangkan.",
                "Di pelukanmu, aku menemukan rumah untuk bersandar, tempat paling teduh untuk pulang setelah lelah bertarung dengan ekspektasi dunia yang begitu keras.",
                "Setiap langkah kecil yang kita ambil bersama, setiap tempat baru yang kita kunjungi, adalah bukti bahwa petualangan hidup bersamamu adalah yang terbaik yang pernah kumiliki.",
                "Mengunci komitmen dan janji di bawah langit malam ini, aku sadar bahwa aku tidak hanya ingin mencintaimu hari ini, tetapi juga esok dan setiap detik yang tersisa dalam hidupku.",
                "Masa depan yang indah menanti kita di cakrawala, dan aku tidak sabar untuk menua bersama, merayakan setiap musim kehidupan, denganmu sebagai satu-satunya tujuan."
            ];
            for (let i = 1; i <= 10; i++) {
                document.write(`
                    <div class="photo-card" id="card-${i}">
                        <img src="foto${11-i}.jpeg" alt="Kenangan">
                        <div class="story-text">"${captions[i-1]}"</div>
                    </div>
                `);
            }
        </script>
    </div>

    <script>
        function startJourney() {
            document.getElementById("hero").style.display = "none";
            document.getElementById("bgMusic").play().catch(()=>{});
            document.getElementById("albumView").classList.add('active');
            window.addEventListener('scroll', () => {
                document.querySelectorAll('.photo-card').forEach(card => {
                    if (card.getBoundingClientRect().top < window.innerHeight * 0.8) card.classList.add('visible');
                });
            });
        }
        function createSakura() {
            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('sakura');
                petal.innerText = '🌸';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                document.getElementById('sakura-particles').appendChild(petal);
                setTimeout(() => petal.remove(), 10000);
            }, 600);
        }
        createSakura();
    </script>
</body>
</html>
